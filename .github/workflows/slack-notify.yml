name: Slack ŌĆö PR Notification

on:
  pull_request:
    types: [opened, closed]
    branches: [main, develop]

jobs:
  notify-opened:
    name: Notify Slack ŌĆö Opened
    if: github.event.action == 'opened'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Post to Slack and store thread ts
        run: |
          RESPONSE=$(curl -sSf -X POST "https://slack.com/api/chat.postMessage" \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$(jq -n \
              --arg channel "$SLACK_CHANNEL_ID" \
              --arg url "$PR_URL" \
              --arg num "$PR_NUMBER" \
              --arg title "$PR_TITLE" \
              --arg author "$PR_AUTHOR" \
              --arg base "$BASE_REF" \
              --arg head "$HEAD_REF" \
              '{channel: $channel, text: ("*New PR opened* ŌĆö <" + $url + "|#" + $num + ": " + $title + ">"), blocks: [{type:"section",text:{type:"mrkdwn",text:(":github: *New PR opened*\n<" + $url + "|#" + $num + ": " + $title + ">\n*Author:* " + $author + "\n*Base:* `" + $base + "` ŌåÉ `" + $head + "`")}}]}'
            )")

          echo "Slack response: $RESPONSE"
          if [ "$(echo "$RESPONSE" | jq -r '.ok')" != "true" ]; then
            echo "::error::Slack API error: $(echo "$RESPONSE" | jq -r '.error')"
            exit 1
          fi
          SLACK_TS=$(echo "$RESPONSE" | jq -r '.ts')

          gh api "repos/$GITHUB_REPOSITORY/issues/$PR_NUMBER/comments" \
            --method POST \
            -f body="<!-- slack-thread-ts: $SLACK_TS -->"
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          BASE_REF: ${{ github.base_ref }}
          HEAD_REF: ${{ github.head_ref }}
          GH_TOKEN: ${{ github.token }}

  notify-merged:
    name: Notify Slack ŌĆö Merged
    if: github.event.action == 'closed' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - name: Post merged reply to Slack thread
        run: |
          SLACK_TS=$(gh api "repos/$GITHUB_REPOSITORY/issues/$PR_NUMBER/comments?per_page=100" \
            --jq '[.[] | select(.body | startswith("<!-- slack-thread-ts:"))] | first | .body | ltrimstr("<!-- slack-thread-ts: ") | rtrimstr(" -->")')

          if [ -z "$SLACK_TS" ] || [ "$SLACK_TS" = "null" ]; then
            echo "::warning::No slack-thread-ts comment found for PR #$PR_NUMBER ŌĆö posting as top-level message"
          fi

          PAYLOAD=$(jq -n \
            --arg channel "$SLACK_CHANNEL_ID" \
            --arg ts "$SLACK_TS" \
            --arg url "$PR_URL" \
            --arg num "$PR_NUMBER" \
            --arg title "$PR_TITLE" \
            --arg author "$PR_AUTHOR" \
            --arg base "$BASE_REF" \
            --arg merger "$MERGED_BY" \
            'if ($ts == "" or $ts == "null")
             then {channel: $channel}
             else {channel: $channel, thread_ts: $ts}
             end
             + {text: ("*PR merged* ŌĆö <" + $url + "|#" + $num + ": " + $title + ">"),
                blocks: [{type:"section",text:{type:"mrkdwn",text:(":merged: *PR merged*\n<" + $url + "|#" + $num + ": " + $title + ">\n*Author:* " + $author + "   *Merged by:* " + $merger + "\n*Into:* `" + $base + "`")}}]}')

          RESPONSE=$(curl -sSf -X POST "https://slack.com/api/chat.postMessage" \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$PAYLOAD")

          echo "Slack response: $RESPONSE"
          if [ "$(echo "$RESPONSE" | jq -r '.ok')" != "true" ]; then
            echo "::error::Slack API error: $(echo "$RESPONSE" | jq -r '.error')"
            exit 1
          fi
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          BASE_REF: ${{ github.base_ref }}
          MERGED_BY: ${{ github.event.pull_request.merged_by.login || 'unknown' }}
          GH_TOKEN: ${{ github.token }}
