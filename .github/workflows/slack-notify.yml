name: Slack — PR Notification

on:
  pull_request:
    types: [opened, closed]
    branches: [main, develop]

jobs:
  notify-opened:
    name: Notify Slack — Opened
    if: github.event.action == 'opened'
    runs-on: ubuntu-latest
    steps:
      - name: Post PR opened message
        run: |
          curl -sSf -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d "$(jq -n \
              --arg url "$PR_URL" \
              --arg num "$PR_NUMBER" \
              --arg title "$PR_TITLE" \
              --arg author "$PR_AUTHOR" \
              --arg base "$BASE_REF" \
              --arg head "$HEAD_REF" \
              '{text: ("*New PR opened* — <" + $url + "|#" + $num + ": " + $title + ">"), blocks: [{type:"section",text:{type:"mrkdwn",text:(":github: *New PR opened*\n<" + $url + "|#" + $num + ": " + $title + ">\n*Author:* " + $author + "\n*Base:* `" + $base + "` ← `" + $head + "`")}}]}'
            )"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          BASE_REF: ${{ github.base_ref }}
          HEAD_REF: ${{ github.head_ref }}

  notify-merged:
    name: Notify Slack — Merged
    if: github.event.action == 'closed' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Post PR merged message
        run: |
          curl -sSf -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d "$(jq -n \
              --arg url "$PR_URL" \
              --arg num "$PR_NUMBER" \
              --arg title "$PR_TITLE" \
              --arg author "$PR_AUTHOR" \
              --arg base "$BASE_REF" \
              --arg merger "$MERGED_BY" \
              '{text: ("*PR merged* — <" + $url + "|#" + $num + ": " + $title + ">"), blocks: [{type:"section",text:{type:"mrkdwn",text:(":merged: *PR merged*\n<" + $url + "|#" + $num + ": " + $title + ">\n*Author:* " + $author + "   *Merged by:* " + $merger + "\n*Into:* `" + $base + "`")}}]}'
            )"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          BASE_REF: ${{ github.base_ref }}
          MERGED_BY: ${{ github.event.pull_request.merged_by.login || 'unknown' }}
