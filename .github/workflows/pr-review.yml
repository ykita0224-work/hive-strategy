name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize]
    branches: [main, develop]

jobs:
  ai-review:
    name: Claude Review + Debate + Auto-Fix
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'skip-ai-review') }}
    permissions:
      pull-requests: write   # post review comments + replies
      contents: write        # push auto-fix commits back to PR branch

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Check out the actual PR branch so we can push fixes back
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        run: pip install uv

      - name: Install skill dependencies
        run: uv pip install -r skills/pr-review/requirements.txt --system

      - name: Review, Debate & Auto-Fix
        run: python skills/pr-review/main.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
